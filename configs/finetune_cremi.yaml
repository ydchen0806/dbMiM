seed: 42
device: cuda
output_dir: /volume/med-train/users/dchen02/code/dbMiM/outputs/finetune_cremi_dbmim
pretrained: /volume/med-train/users/dchen02/code/dbMiM/outputs/pretrain_fafb_dbmim/pretrained_latest.pt
data:
  synthetic: false
  image_paths:
    - /volume/med-train/users/dchen02/code/dbMiM/data/CREMI/images
  label_paths:
    - /volume/med-train/users/dchen02/code/dbMiM/data/CREMI/labels
  volume_size: [16, 128, 128]
  length_multiplier: 512
  augment: true
model:
  in_channels: 1
  out_channels: 3
  volume_size: [16, 128, 128]
  patch_size: [4, 16, 16]
  embed_dim: 192
  depth: 6
  num_heads: 6
  dropout: 0.05
train:
  batch_size: 8
  epochs: 100
  max_steps: 200000
  num_workers: 8
  lr: 0.0001
  weight_decay: 0.01
  amp: true
  log_every: 20
  eval_every: 1
  val_fraction: 0.1
  pos_weight: 1.0
  clip_grad: 1.0
