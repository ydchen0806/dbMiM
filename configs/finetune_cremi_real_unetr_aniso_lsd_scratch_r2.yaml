seed: 52
device: cuda
output_dir: /volume/med-train/users/dchen02/code/dbMiM/outputs/finetune_cremi_real_unetr_aniso_lsd_scratch_r2
pretrained: ""
data:
  synthetic: false
  image_paths:
    - /volume/med-train/users/dchen02/code/dbMiM/data/CREMI
  label_paths:
    - /volume/med-train/users/dchen02/code/dbMiM/data/CREMI
  image_keys: [volumes/raw, raw, main]
  label_keys: [volumes/labels/neuron_ids, labels, label, gt]
