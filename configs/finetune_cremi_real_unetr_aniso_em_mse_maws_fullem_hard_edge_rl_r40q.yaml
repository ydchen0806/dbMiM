    bcar_calibration_weight: 0.0
    membrane_weight: 0.75
    membrane_axis_weights:
    - 0.25
    - 1.0
    - 1.0
    membrane_clip: 4.0
    membrane_normalize: true
    channel_weights:
    - 1.35
    - 1.0
    - 1.0
  encoder_lr: 1.0e-05
  encoder_param_prefixes:
  - pos_embed
  - patch_embed
  - encoder_blocks
  - norm
