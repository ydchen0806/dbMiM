seed: 305
device: cuda
output_dir: /volume/med-train/users/dchen02/code/dbMiM/outputs/finetune_cremi_real_unetr_aniso_em_mse_maws_fullem_hard_edge_rl_r40q
pretrained: /volume/med-train/users/dchen02/code/dbMiM/outputs/pretrain_em_full_hard_edge_rl_dbmim_r40/pretrained_latest.pt
pretrained_include_prefixes:
- pos_embed
- patch_embed
- encoder_blocks
- norm
data:
  synthetic: false
  image_paths:
  - /volume/med-train/users/dchen02/code/dbMiM/data/CREMI
  label_paths:
  - /volume/med-train/users/dchen02/code/dbMiM/data/CREMI
  image_keys:
  - volumes/raw
  - raw
  - main
  label_keys:
  - volumes/labels/neuron_ids
  - labels
  - label
  - gt
  volume_size:
  - 32
  - 160
  - 160
  length_multiplier: 2048
  augment: true
  widen_border: true
  widen_border_radius: 1
  augment_rotate_xy: true
  augment_gamma: true
  augment_gamma_range:
  - 0.7
  - 1.5
  augment_noise_std: 0.035
model:
  architecture: unetr_aniso_em
  in_channels: 1
  out_channels: 3
  volume_size:
  - 32
  - 160
  - 160
  patch_size:
  - 4
  - 16
  - 16
  embed_dim: 192
  depth: 6
  num_heads: 6
  feature_size: 32
  dropout: 0.05
  em_refine_depth: 2
  channel_bias_init:
  - -0.2
  - 0.0
